<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leadvault Lead Extractor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      background: #fff;
      color: #1a1a2e;
    }

    .header {
      background: #0a0a0a;
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      width: 32px; height: 32px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .header-logo img { width: 100%; height: 100%; object-fit: cover; }
    .header-text h1 { font-size: 14px; font-weight: 700; color: #fff; }
    .header-text p  { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }

    .body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-radius: 8px;
      font-size: 12px; font-weight: 500;
    }
    .status-bar.connected    { background: #F0FDF4; color: #16A34A; border: 1px solid #BBF7D0; }
    .status-bar.disconnected { background: #FFF7ED; color: #D97706; border: 1px solid #FDE68A; }
    .status-bar.error        { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #16A34A; }
    .dot.amber { background: #D97706; }
    .dot.red   { background: #DC2626; }

    label {
      font-size: 11px; font-weight: 600; color: #6B7280; display: block;
      margin-bottom: 4px; letter-spacing: .03em; text-transform: uppercase;
    }
    input {
      width: 100%; padding: 8px 10px;
      border: 1px solid #E5E7EB; border-radius: 7px;
      font-size: 13px; color: #1a1a2e;
      outline: none; transition: border-color .15s; font-family: inherit;
    }
    input:focus { border-color: #6B5ECD; box-shadow: 0 0 0 3px rgba(107,94,205,.1); }

    .btn {
      width: 100%; padding: 10px;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      font-family: inherit;
    }
    .btn-primary { background: #6B5ECD; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #5a4db8; }
    .btn-outline { background: #fff; color: #6B5ECD; border: 1px solid #D1C8F5; }
    .btn-outline:hover { background: #F5F3FF; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .divider { height: 1px; background: #F3F4F6; }

    .result {
      padding: 10px 12px; border-radius: 8px;
      font-size: 12px; display: none;
    }
    .result.success { background: #F0FDF4; color: #16A34A; border: 1px solid #BBF7D0; display: block; }
    .result.error   { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; display: block; }

    .page-hint {
      font-size: 11px; color: #9CA3AF; text-align: center; line-height: 1.5; padding: 4px 0;
    }

    .footer {
      padding: 10px 18px 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer a { font-size: 11px; color: #6B5ECD; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .version { font-size: 10px; color: #D1D5DB; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo"><img src="logo-icon.png" alt="Leadvault" /></div>
    <div class="header-text">
      <h1>Leadvault</h1>
      <p>LinkedIn &amp; Sales Navigator sync</p>
    </div>
  </div>

  <div class="body">
    <div id="statusBar" class="status-bar disconnected">
      <span class="dot amber" id="statusDot"></span>
      <span id="statusText">Not connected — save settings first</span>
    </div>

    <div>
      <label>Dashboard URL</label>
      <input id="dashUrl" type="url" placeholder="http://localhost:3001/api" />
    </div>
    <div>
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="leadvault-2026" />
    </div>
    <button class="btn btn-outline" id="saveBtn">Save &amp; Test Connection</button>

    <div class="divider"></div>

    <button class="btn btn-primary" id="extractBtn" disabled>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 2v8M5 7l3 3 3-3M2 13h12" />
      </svg>
      Extract Leads from This Page
    </button>

    <div id="pageHint" class="page-hint" style="display:none">
      Navigate to a <strong>LinkedIn People search</strong> or <strong>Sales Navigator</strong> search page to extract leads.
    </div>

    <div id="result" class="result"></div>
  </div>

  <div class="footer">
    <a id="dashLink" href="#" target="_blank">Open Dashboard ↗</a>
    <span class="version">v2.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
